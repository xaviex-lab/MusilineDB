{# cadastro\templates\cadastro\deletar.html #}

{% extends 'cadastro/base.html' %}

{% block titulo %}Deletar {{ musica.titulo }}{% endblock %}

{% block conteudo %}
    <h2>Deletar "{{ musica.titulo }}"?</h2>
    <p>Essa ação não pode ser desfeita!</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar</button>
        <a href="{% url 'detalhe' musica.id %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
