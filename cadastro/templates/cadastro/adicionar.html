{# cadastro\templates\cadastro\adicionar.html #}

{% extends 'cadastro/base.html' %}


{% block titulo %} - Adicionar Música{% endblock %}

{% block conteudo %}
<h2>Adicionar Música</h2>

<form method="POST">
    {% csrf_token %}


    {% for field in form %}
    <p class="mb-3">
        {{ field.label_tag }}
        {{ field }}
    </p>
    {% endfor %}

    <button type="submit" class="btn btn-dark">Salvar</button>
</form>


{% endblock %}
