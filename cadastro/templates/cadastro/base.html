<!DOCTYPE html>
<html lang="pt-br">

<head>

    <title>{% block titulo %}Meu Site{% endblock %}</title>
</head>

<body>

    <header>
        <h1>Cadastro</h1>
    </header>

    <hr>

    <nav>
        <a href="{% url 'index' %}">Início</a> |
